services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: artio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/artio
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: docker
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: python -m app.pipeline.runner
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/artio
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: docker
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
