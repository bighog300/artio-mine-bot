version: "3.9"

services:
  api:
    # image: used by `docker compose pull` on the server.
    # build: used by `docker compose up --build` for local development.
    image: ghcr.io/bighog300/artio-mine-bot:latest
    build: .
    ports:
      - "8765:8000"
    volumes:
      # Named volume — survives container restarts, no host-path assumptions
      - artio_data:/app/data
    env_file:
      - .env
    environment:
      # SQLite default — overridden by DATABASE_URL in .env when Postgres is configured
      - DATABASE_URL=sqlite+aiosqlite:////app/data/miner.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  frontend:
    image: ghcr.io/bighog300/artio-mine-bot-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  artio_data:
