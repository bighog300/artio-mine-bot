services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: artio
      POSTGRES_PASSWORD: artio
      POSTGRES_DB: artio_miner
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artio -d artio_miner"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  api:
    image: ghcr.io/bighog300/artio-mine-bot:latest
    build: .
    ports:
      - "8000:8000"
    volumes:
      - artio_data:/app/data
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://artio:artio@db:5432/artio_miner
      ENVIRONMENT: ${ENVIRONMENT:-development}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 45s
    restart: unless-stopped

  frontend:
    image: ghcr.io/bighog300/artio-mine-bot-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  artio_data:
  postgres_data:
