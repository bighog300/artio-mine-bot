version: '3.8'

services:
  db:
    image: postgres:16
    pull_policy: if_not_present
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: artio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    pull_policy: if_not_present
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    command: ["./scripts/start.sh", "uvicorn", "app.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8765:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/artio
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: docker
      PYTHONUNBUFFERED: "1"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 5

  worker-1: &worker-template
    build: .
    command: ["python", "-m", "app.pipeline.runner"]
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/artio
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: docker
      PYTHONUNBUFFERED: "1"
      MAX_CONCURRENT_JOBS: "5"
      WORKER_ID: worker-1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker-2:
    <<: *worker-template
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/artio
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: docker
      PYTHONUNBUFFERED: "1"
      MAX_CONCURRENT_JOBS: "5"
      WORKER_ID: worker-2

  worker-3:
    <<: *worker-template
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/artio
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: docker
      PYTHONUNBUFFERED: "1"
      MAX_CONCURRENT_JOBS: "5"
      WORKER_ID: worker-3

  worker-4:
    <<: *worker-template
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/artio
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: docker
      PYTHONUNBUFFERED: "1"
      MAX_CONCURRENT_JOBS: "5"
      WORKER_ID: worker-4

  worker-5:
    <<: *worker-template
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/artio
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: docker
      PYTHONUNBUFFERED: "1"
      MAX_CONCURRENT_JOBS: "5"
      WORKER_ID: worker-5

  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/artio
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: docker
      PYTHONUNBUFFERED: "1"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:80"
    environment:
      VITE_API_URL: http://localhost:8765
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
    depends_on:
      - api

volumes:
  postgres_data:
