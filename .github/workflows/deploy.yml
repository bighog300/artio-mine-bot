name: Deploy to Production

on:
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          IMAGE_API: ghcr.io/${{ github.repository }}:latest
          IMAGE_FRONTEND: ghcr.io/${{ github.repository }}-frontend:latest
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: GHCR_TOKEN,GITHUB_ACTOR,IMAGE_API,IMAGE_FRONTEND
          script: |
            set -e

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            mkdir -p /home/craig/artio-mine-bot
            cd /home/craig/artio-mine-bot

            # Write production compose — port 8765 avoids clash with Portainer on 8000
            cat > docker-compose.yml << COMPOSE
            services:
              api:
                image: ${IMAGE_API}
                ports:
                  - "8765:8000"
                volumes:
                  - artio_data:/app/data
                env_file:
                  - .env
                environment:
                  - DATABASE_URL=sqlite+aiosqlite:////app/data/miner.db
                restart: unless-stopped

              frontend:
                image: ${IMAGE_FRONTEND}
                ports:
                  - "5173:80"
                environment:
                  - VITE_API_URL=http://localhost:8765
                depends_on:
                  - api
                restart: unless-stopped

            volumes:
              artio_data:
            COMPOSE

            docker compose pull
            docker compose up -d --remove-orphans

            echo "Deployment complete — API on :8765, Frontend on :5173"
