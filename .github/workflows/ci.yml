name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install system deps
        run: |
          python -m pip install --upgrade pip
          pip install hatchling editables

      - name: 📦 Install project + dev deps
        run: |
          pip install -e ".[dev]"

      - name: 📁 Ensure test directories exist
        run: |
          mkdir -p data

      - name: 🧪 Run tests (with verbose output)
        run: |
          pytest -vv --maxfail=10 --disable-warnings

      - name: 📄 Dump test artifacts on failure
        if: failure()
        run: |
          echo "==== FILE STRUCTURE ===="
          ls -R
