name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: sqlite+aiosqlite:///./data/ci.db
      REDIS_URL: redis://localhost:6379/0
      ENVIRONMENT: development
      OPENAI_API_KEY: test-key
      PLAYWRIGHT_ENABLED: "false"

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install project + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: 📁 Ensure test directories exist
        run: mkdir -p data

      - name: 🧵 Start RQ worker for queue integration checks
        run: |
          rq worker default --url "$REDIS_URL" &
          echo $! > /tmp/rq_worker.pid

      - name: ✅ Wait for Redis and worker readiness
        run: |
          python - <<"PY"
          import time
          import redis
          from rq import Worker

          import os

          conn = redis.from_url(os.environ["REDIS_URL"])
          for _ in range(30):
              try:
                  conn.ping()
                  if Worker.count(connection=conn) > 0:
                      break
              except Exception:
                  pass
              time.sleep(1)
          else:
              raise SystemExit("Redis/RQ worker was not ready in time")
          PY

      - name: 🧪 Run backend tests
        run: pytest -vv --maxfail=10 --disable-warnings

      - name: 🧹 Stop background worker
        if: always()
        run: |
          if [ -f /tmp/rq_worker.pid ]; then
            kill "$(cat /tmp/rq_worker.pid)" || true
          fi

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install frontend deps
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: 🧪 Run frontend tests
        run: npm run test

      - name: 🏗️ Build frontend
        run: npm run build
